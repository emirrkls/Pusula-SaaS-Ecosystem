spring.application.name=pusula-backend

# Database Configuration (PostgreSQL)
spring.datasource.url=jdbc:postgresql://localhost:5432/pusula_db
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
# spring.h2.console.enabled=true

# Multi-tenancy (Logical)
# We are using a discriminator column approach, so standard JPA handles it mostly,
# but we might need filters later.

# Security
# Generate a secure secret for JWT in production!
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.expiration=86400000

# Server Configuration
server.port=8081

# Spring Boot 3.x Path Matching Configuration
# CRITICAL: Force AntPathMatcher for Spring Boot 2.x compatibility
spring.mvc.pathmatch.matching-strategy=ant_path_matcher

# Disable PathPatternParser (Spring Boot 3.x default)
spring.mvc.path-pattern.use=false

# Prevent throwing exception when static resource not found
# CRITICAL: Disable automatic resource mappings - we define them explicitly in MvcConfig
# This prevents Spring Boot from adding a /** catchall handler that intercepts /api/** requests
spring.web.resources.add-mappings=false
spring.mvc.throw-exception-if-no-handler-found=false

# Logging Configuration
logging.level.org.springframework.context.annotation=DEBUG
logging.level.org.springframework.web.servlet.mvc.method.annotation=DEBUG
logging.level.org.springframework.boot.autoconfigure=INFO

# TRACE logging for handler mapping diagnostics
logging.level.org.springframework.web.servlet.handler=TRACE
logging.level.org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerMapping=TRACE
logging.level.org.springframework.web.servlet.resource=DEBUG
