spring.application.name=pusula-backend
app.deploy.version=${APP_DEPLOY_VERSION:vps}
app.business.timezone=${APP_BUSINESS_TIMEZONE:Europe/Istanbul}

# Server Configuration - Bind to all interfaces
server.address=0.0.0.0
server.port=8080

# Database Configuration (PostgreSQL on VPS)
# Update these values according to your VPS PostgreSQL setup
spring.datasource.url=jdbc:postgresql://localhost:5432/pusula_db
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Security
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# Logging
logging.level.root=INFO
logging.level.com.pusula=INFO
logging.level.org.springframework=INFO
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO
logging.level.org.springframework.web.servlet.handler.HandlerMappingIntrospector=WARN
logging.level.org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerMapping=INFO

# Google OAuth (Android sign in)
google.oauth.web-client-id=${GOOGLE_WEB_CLIENT_ID:}

# Google Play subscription verification
google.play.package-name=${GOOGLE_PLAY_PACKAGE_NAME:}
google.play.api-access-token=${GOOGLE_PLAY_API_ACCESS_TOKEN:}

# Iyzico webhook signature validation
iyzico.webhook.secret=${IYZICO_WEBHOOK_SECRET:}
