spring.application.name=pusula-backend

# Server Configuration - Bind to all interfaces
server.address=0.0.0.0
server.port=8080

# Database Configuration (PostgreSQL on VPS)
# Update these values according to your VPS PostgreSQL setup
spring.datasource.url=jdbc:postgresql://localhost:5432/pusula_db
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Security
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.expiration=86400000

# Logging
logging.level.root=INFO
logging.level.com.pusula=DEBUG
